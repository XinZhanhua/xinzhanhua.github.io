<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Xinzhanhua 的 GitHub 个人主页">
  <title>Xinzhanhua | GitHub 个人主页</title>
  <style>
    :root {
      --bg: #f7f3eb;
      --bg-soft: rgba(255, 255, 255, 0.72);
      --surface: #fffdf8;
      --text: #172033;
      --muted: #5b6577;
      --muted-strong: #33405a;
      --border: rgba(23, 32, 51, 0.1);
      --primary: #1f5eff;
      --primary-soft: rgba(31, 94, 255, 0.12);
      --secondary: #0c9b90;
      --shadow-sm: 0 12px 30px rgba(22, 35, 66, 0.06);
      --shadow-lg: 0 28px 70px rgba(22, 35, 66, 0.12);
      --radius-sm: 18px;
      --radius-md: 28px;
      --container: 1140px;
      --heading-font: "Noto Serif SC", "Songti SC", Georgia, serif;
      --body-font: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      --transition: 220ms ease;
    }

    [data-theme="dark"] {
      --bg: #0f1729;
      --bg-soft: rgba(18, 28, 49, 0.78);
      --surface: #141f36;
      --text: #edf3ff;
      --muted: #9caacc;
      --muted-strong: #cdd9f7;
      --border: rgba(255, 255, 255, 0.1);
      --primary: #78a5ff;
      --primary-soft: rgba(120, 165, 255, 0.18);
      --secondary: #4dd7c8;
      --shadow-sm: 0 18px 40px rgba(2, 6, 23, 0.35);
      --shadow-lg: 0 32px 80px rgba(2, 6, 23, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: var(--body-font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(31, 94, 255, 0.12), transparent 32%),
        radial-gradient(circle at 85% 12%, rgba(12, 155, 144, 0.12), transparent 26%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), transparent 32%),
        var(--bg);
      transition: background-color var(--transition), color var(--transition);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
      opacity: 0.5;
      z-index: -2;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      color: inherit;
      background: none;
      border: 0;
      cursor: pointer;
    }

    .container {
      width: min(calc(100% - 32px), var(--container));
      margin: 0 auto;
    }

    .panel {
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow-sm);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: color-mix(in srgb, var(--bg-soft) 92%, transparent);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .nav-shell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 74px;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--heading-font);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 0 18px rgba(31, 94, 255, 0.55);
      flex-shrink: 0;
    }

    .nav-group,
    .site-nav,
    .nav-controls {
      display: flex;
      align-items: center;
    }

    .nav-group {
      gap: 18px;
    }

    .site-nav {
      gap: 8px;
      flex-wrap: wrap;
    }

    .site-nav a {
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.98rem;
      transition: background-color var(--transition), color var(--transition), transform var(--transition);
    }

    .site-nav a:hover,
    .site-nav a.active {
      color: var(--text);
      background: var(--primary-soft);
      transform: translateY(-1px);
    }

    .nav-controls {
      gap: 10px;
    }

    .control-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 42px;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition), border-color var(--transition);
    }

    .control-btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--primary) 35%, var(--border));
    }

    .theme-toggle {
      position: relative;
      width: 42px;
      padding: 0;
      overflow: hidden;
    }

    .theme-icon {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 20px;
      height: 20px;
      transition: transform 260ms ease, opacity 260ms ease;
      pointer-events: none;
    }

    [data-theme="light"] .theme-icon.moon {
      transform: translateY(18px) rotate(90deg);
      opacity: 0;
    }

    [data-theme="light"] .theme-icon.sun {
      transform: translateY(0) rotate(0deg);
      opacity: 1;
    }

    [data-theme="dark"] .theme-icon.sun {
      transform: translateY(-18px) rotate(-90deg);
      opacity: 0;
    }

    [data-theme="dark"] .theme-icon.moon {
      transform: translateY(0) rotate(0deg);
      opacity: 1;
    }

    .menu-toggle {
      display: none;
      width: 42px;
      height: 42px;
      padding: 0;
    }

    .menu-toggle span {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: var(--text);
      margin: 4px auto;
      transition: transform var(--transition), opacity var(--transition);
    }

    body.nav-open .menu-toggle span:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }

    body.nav-open .menu-toggle span:nth-child(2) {
      opacity: 0;
    }

    body.nav-open .menu-toggle span:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }

    .hero {
      position: relative;
      padding: 108px 0 68px;
      text-align: center;
      overflow: hidden;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(18px);
      pointer-events: none;
    }

    .hero::before {
      width: 340px;
      height: 340px;
      background: rgba(31, 94, 255, 0.12);
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
    }

    .hero::after {
      width: 240px;
      height: 240px;
      background: rgba(12, 155, 144, 0.12);
      right: 14%;
      bottom: 60px;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .hero-avatar {
      position: relative;
      width: 160px;
      height: 160px;
      display: grid;
      place-items: center;
      margin-bottom: 6px;
    }

    .avatar-glow {
      position: absolute;
      inset: 10px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(31, 94, 255, 0.34), transparent 65%);
      filter: blur(12px);
      transform: scale(1.1);
    }

    .avatar-core {
      position: relative;
      width: 136px;
      height: 136px;
      border-radius: 50%;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.22), transparent 48%),
        linear-gradient(160deg, #19346b 0%, #2d64ff 48%, #7ab6ff 100%);
      border: 5px solid rgba(255, 255, 255, 0.85);
      box-shadow: var(--shadow-lg);
      display: grid;
      place-items: center;
      color: #ffffff;
      font-family: var(--heading-font);
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px dashed rgba(31, 94, 255, 0.22);
      animation: spin 18s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--secondary);
    }

    .hero-title {
      max-width: 960px;
      font-family: var(--heading-font);
      font-size: clamp(2.8rem, 6vw, 5.2rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--text) 0%, var(--primary) 70%, var(--secondary) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-subtitle {
      max-width: 760px;
      font-size: 1.12rem;
      line-height: 1.9;
      color: var(--muted-strong);
    }

    .hero-tags,
    .pill-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .hero-tag,
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      color: var(--muted-strong);
      font-size: 0.94rem;
      box-shadow: var(--shadow-sm);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 6px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 0.98rem;
      font-weight: 600;
      transition: transform var(--transition), box-shadow var(--transition), background-color var(--transition);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 62%, var(--secondary)));
      box-shadow: 0 18px 40px rgba(31, 94, 255, 0.22);
    }

    .btn-secondary {
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow-sm);
    }

    .hero-metrics {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .metric-card {
      padding: 24px;
      text-align: left;
      border-radius: var(--radius-md);
    }

    .metric-value {
      display: block;
      margin-bottom: 8px;
      color: var(--primary);
      font-family: var(--heading-font);
      font-size: 2.2rem;
      line-height: 1;
    }

    .metric-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 1.02rem;
    }

    .metric-note {
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.7;
    }

    .section {
      padding: 84px 0;
    }

    .section-heading {
      max-width: 680px;
      margin: 0 auto 38px;
      text-align: center;
    }

    .section-kicker {
      color: var(--primary);
      font-size: 0.92rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .section-title {
      font-family: var(--heading-font);
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.18;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
    }

    .section-desc {
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.85;
    }
    .about-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 22px;
    }

    .about-card {
      padding: 36px;
    }

    .about-lead {
      margin-bottom: 18px;
      font-family: var(--heading-font);
      font-size: 1.55rem;
      line-height: 1.45;
    }

    .about-body,
    .focus-card p,
    .timeline-card p,
    .contact-feature p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 1rem;
    }

    .focus-grid,
    .contact-list {
      display: grid;
      gap: 14px;
    }

    .focus-card,
    .stack-card,
    .timeline-card {
      padding: 24px;
    }

    .focus-card h3,
    .stack-card h3,
    .timeline-card h3 {
      margin-bottom: 8px;
      font-size: 1.08rem;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }

    .content-card {
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }

    .content-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: color-mix(in srgb, var(--primary) 20%, var(--border));
    }

    .card-visual {
      position: relative;
      aspect-ratio: 16 / 11;
      padding: 18px;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      color: #ffffff;
    }

    .card-visual::before,
    .card-visual::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      opacity: 0.6;
    }

    .tone-cobalt {
      background:
        radial-gradient(circle at 22% 24%, rgba(255, 255, 255, 0.3), transparent 28%),
        linear-gradient(135deg, #1b2f6a 0%, #2455ff 50%, #8ac6ff 100%);
    }

    .tone-cobalt::before {
      width: 180px;
      height: 180px;
      right: -28px;
      bottom: -42px;
      border: 1px solid rgba(255, 255, 255, 0.32);
    }

    .tone-sand {
      background:
        radial-gradient(circle at 76% 28%, rgba(255, 255, 255, 0.38), transparent 25%),
        linear-gradient(135deg, #7d5f44 0%, #b98f63 48%, #f0d2aa 100%);
    }

    .tone-sand::before {
      width: 110px;
      height: 110px;
      left: 24px;
      bottom: 20px;
      background: rgba(255, 255, 255, 0.14);
    }

    .tone-teal {
      background:
        radial-gradient(circle at 26% 22%, rgba(255, 255, 255, 0.28), transparent 25%),
        linear-gradient(135deg, #15435f 0%, #0ea5a3 48%, #8bf0dd 100%);
    }

    .tone-teal::before {
      width: 120px;
      height: 120px;
      right: 20px;
      top: 18px;
      border: 1px solid rgba(255, 255, 255, 0.28);
    }

    .visual-code {
      position: relative;
      z-index: 1;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.12);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .visual-mark {
      position: relative;
      z-index: 1;
      width: 72px;
      height: 72px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: grid;
      place-items: center;
      font-family: var(--heading-font);
      font-size: 1.4rem;
      font-weight: 700;
    }

    .card-body,
    .contact-feature {
      padding: 28px;
    }

    .card-title {
      margin-bottom: 10px;
      font-size: 1.35rem;
      line-height: 1.35;
    }

    .card-desc {
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.82;
      margin-bottom: 18px;
      min-height: 5.4em;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-weight: 700;
      transition: gap var(--transition);
    }

    .content-card:hover .card-link {
      gap: 12px;
    }

    .timeline-shell {
      position: relative;
      max-width: 920px;
      margin: 0 auto;
      padding-left: 28px;
    }

    .timeline-shell::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 7px;
      width: 2px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--primary) 58%, transparent), rgba(127, 138, 158, 0.22));
    }

    .timeline-item {
      position: relative;
      padding: 0 0 22px 26px;
    }

    .timeline-dot {
      position: absolute;
      left: -1px;
      top: 6px;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--surface);
      border: 3px solid var(--primary);
      box-shadow: 0 0 0 8px var(--primary-soft);
    }

    .timeline-date {
      display: inline-block;
      margin-bottom: 10px;
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .stack-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .stack-card .pill-list {
      justify-content: flex-start;
    }

    .contact-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr);
      gap: 22px;
      align-items: stretch;
    }

    .contact-feature {
      background:
        radial-gradient(circle at top right, rgba(31, 94, 255, 0.12), transparent 28%),
        color-mix(in srgb, var(--surface) 92%, transparent);
    }

    .contact-feature h3 {
      margin-bottom: 12px;
      font-family: var(--heading-font);
      font-size: 1.5rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition), border-color var(--transition);
    }

    .contact-item:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--primary) 18%, var(--border));
    }

    .contact-label {
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .contact-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted-strong);
      line-height: 1.5;
      word-break: break-word;
    }

    .contact-arrow {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--primary-soft);
      display: grid;
      place-items: center;
      color: var(--primary);
      font-size: 1.15rem;
    }

    .site-footer {
      padding: 24px 0 40px;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 980px) {
      .about-grid,
      .contact-wrap,
      .stack-grid,
      .cards-grid,
      .hero-metrics {
        grid-template-columns: 1fr;
      }

      .cards-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stack-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .nav-shell {
        min-height: 68px;
      }

      .menu-toggle {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .nav-group {
        position: absolute;
        top: calc(100% + 12px);
        left: 16px;
        right: 16px;
        display: none;
        flex-direction: column;
        align-items: stretch;
        padding: 16px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: color-mix(in srgb, var(--surface) 96%, transparent);
        box-shadow: var(--shadow-lg);
      }

      body.nav-open .nav-group {
        display: flex;
      }

      .site-nav,
      .nav-controls {
        width: 100%;
      }

      .site-nav {
        flex-direction: column;
        align-items: stretch;
      }

      .site-nav a {
        width: 100%;
      }

      .nav-controls {
        justify-content: space-between;
      }

      .hero {
        padding-top: 84px;
      }

      .hero-title {
        font-size: clamp(2.5rem, 12vw, 4rem);
      }

      .cards-grid,
      .stack-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .container {
        width: min(calc(100% - 20px), var(--container));
      }

      .hero-avatar {
        width: 132px;
        height: 132px;
      }

      .avatar-core {
        width: 112px;
        height: 112px;
        font-size: 2rem;
      }

      .hero-tag,
      .pill,
      .btn,
      .control-btn {
        width: 100%;
      }

      .hero-actions,
      .hero-tags {
        width: 100%;
      }

      .contact-item {
        align-items: flex-start;
      }
    }
  </style>
</head>

            "</div>" +
            '<div class="card-body">' +
              '<h3 class="card-title">' + item.title + "</h3>" +
              '<p class="card-desc">' + item.desc + "</p>" +
              '<div class="pill-list" style="justify-content:flex-start; margin-bottom:18px;">' + renderPills(item.tags) + "</div>" +
              '<a class="card-link" href="' + item.href + '"' + target + ">" + item.cta + ' <span aria-hidden="true">→</span></a>' +
            "</div>" +
          "</article>"
        );
      }).join("");
    }

    function renderTimeline(items) {
      return items.map((item) => (
        '<div class="timeline-item">' +
          '<span class="timeline-dot" aria-hidden="true"></span>' +
          '<span class="timeline-date">' + item.date + "</span>" +
          '<article class="panel timeline-card">' +
            "<h3>" + item.title + "</h3>" +
            "<p>" + item.desc + "</p>" +
          "</article>" +
        "</div>"
      )).join("");
    }

    function renderStacks(groups) {
      return groups.map((group) => (
        '<article class="panel stack-card">' +
          "<h3>" + group.title + "</h3>" +
          '<div class="pill-list">' + renderPills(group.items) + "</div>" +
        "</article>"
      )).join("");
    }

    function renderContactLinks(items) {
      return items.map((item) => {
        const target = item.href.startsWith("#") ? "" : ' target="_blank" rel="noreferrer noopener"';
        return (
          '<a class="contact-item" href="' + item.href + '"' + target + ">" +
            "<div>" +
              '<div class="contact-label">' + item.label + "</div>" +
              '<div class="contact-value">' + item.value + "</div>" +
            "</div>" +
            '<span class="contact-arrow" aria-hidden="true">↗</span>' +
          "</a>"
        );
      }).join("");
    }

    function renderPage() {
      const copy = siteContent[state.lang];

      document.documentElement.lang = state.lang === "zh" ? "zh-CN" : "en";
      document.title = copy.metaTitle;
      qs(".brand-name").textContent = copy.brand;
      qs(".lang-toggle").textContent = state.lang === "zh" ? "EN" : "中";

      qsa("[data-nav]").forEach((link) => {
        link.textContent = copy.nav[link.dataset.nav];
      });

      qs("#hero-eyebrow").textContent = copy.hero.eyebrow;
      qs("#hero-title").textContent = copy.hero.title;
      qs("#hero-subtitle").textContent = copy.hero.subtitle;
      qs("#hero-primary").textContent = copy.hero.primaryAction;
      qs("#hero-secondary").textContent = copy.hero.secondaryAction;
      qs("#hero-tags").innerHTML = renderPills(copy.hero.tags, "hero-tag");
      qs("#hero-metrics").innerHTML = renderMetrics(copy.hero.metrics);

      qs("#about-kicker").textContent = copy.about.kicker;
      qs("#about-title").textContent = copy.about.title;
      qs("#about-desc").textContent = copy.about.desc;
      qs("#about-lead").textContent = copy.about.lead;
      qs("#about-body").textContent = copy.about.body;
      qs("#focus-grid").innerHTML = renderFocusCards(copy.about.focus);

      qs("#projects-kicker").textContent = copy.projects.kicker;
      qs("#projects-title").textContent = copy.projects.title;
      qs("#projects-desc").textContent = copy.projects.desc;
      qs("#projects-grid").innerHTML = renderProjectCards(copy.projects.items);

      qs("#timeline-kicker").textContent = copy.timeline.kicker;
      qs("#timeline-title").textContent = copy.timeline.title;
      qs("#timeline-desc").textContent = copy.timeline.desc;
      qs("#timeline-shell").innerHTML = renderTimeline(copy.timeline.items);

      qs("#stack-kicker").textContent = copy.stack.kicker;
      qs("#stack-title").textContent = copy.stack.title;
      qs("#stack-desc").textContent = copy.stack.desc;
      qs("#stack-grid").innerHTML = renderStacks(copy.stack.groups);

      qs("#contact-kicker").textContent = copy.contact.kicker;
      qs("#contact-title").textContent = copy.contact.title;
      qs("#contact-desc").textContent = copy.contact.desc;
      qs("#contact-feature-title").textContent = copy.contact.featureTitle;
      qs("#contact-feature-desc").textContent = copy.contact.featureDesc;
      qs("#contact-pills").innerHTML = renderPills(copy.contact.pills);
      qs("#contact-list").innerHTML = renderContactLinks(copy.contact.links);

      qs("#site-footer").textContent = copy.footer;
    }

    function applyTheme() {
      document.documentElement.setAttribute("data-theme", state.theme);
      localStorage.setItem("theme", state.theme);
    }

    function initThemeToggle() {
      qs(".theme-toggle").addEventListener("click", () => {
        state.theme = state.theme === "light" ? "dark" : "light";
        applyTheme();
      });
    }

    function initLangToggle() {
      qs(".lang-toggle").addEventListener("click", () => {
        state.lang = state.lang === "zh" ? "en" : "zh";
        localStorage.setItem("lang", state.lang);
        renderPage();
        initActiveNav();
      });
    }

    function initMobileMenu() {
      const toggle = qs(".menu-toggle");
      toggle.addEventListener("click", () => {
        document.body.classList.toggle("nav-open");
      });

      qsa(".site-nav a").forEach((link) => {
        link.addEventListener("click", () => {
          document.body.classList.remove("nav-open");
        });
      });
    }

    let smoothScrollBound = false;

    function initSmoothScroll() {
      if (smoothScrollBound) {
        return;
      }

      document.addEventListener("click", (event) => {
        const anchor = event.target.closest('a[href^="#"]');
        if (!anchor) {
          return;
        }

        const href = anchor.getAttribute("href");
        if (!href || href === "#") {
          return;
        }

        const target = qs(href);
        if (!target) {
          return;
        }

        event.preventDefault();
        const offset = qs(".site-header").offsetHeight + 12;
        const top = target.getBoundingClientRect().top + window.scrollY - offset;

        window.scrollTo({
          top,
          behavior: "smooth"
        });
      });

      smoothScrollBound = true;
    }

    let sectionObserver;

    function initActiveNav() {
      if (sectionObserver) {
        sectionObserver.disconnect();
      }

      const navLinks = qsa(".site-nav a");
      const navById = new Map(navLinks.map((link) => [link.getAttribute("href").slice(1), link]));

      sectionObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) {
            return;
          }

          navLinks.forEach((link) => link.classList.remove("active"));
          const current = navById.get(entry.target.id);
          if (current) {
            current.classList.add("active");
          }
        });
      }, {
        rootMargin: "-40% 0px -45% 0px",
        threshold: 0.01
      });

      sections.forEach((id) => {
        const element = qs("#" + id);
        if (element) {
          sectionObserver.observe(element);
        }
      });
    }

    applyTheme();
    renderPage();

    document.addEventListener("DOMContentLoaded", () => {
      initThemeToggle();
      initLangToggle();
      initMobileMenu();
      initSmoothScroll();
      initActiveNav();
    });
  </script>
</body>
</html>
