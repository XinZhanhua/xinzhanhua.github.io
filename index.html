<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Xinzhanhua 的 GitHub 个人主页">
  <title>Xinzhanhua | GitHub 个人主页</title>
  <style>
    :root {
      --bg: #f7f3eb;
      --bg-soft: rgba(255, 255, 255, 0.72);
      --surface: #fffdf8;
      --text: #172033;
      --muted: #5b6577;
      --muted-strong: #33405a;
      --border: rgba(23, 32, 51, 0.1);
      --primary: #1f5eff;
      --primary-soft: rgba(31, 94, 255, 0.12);
      --secondary: #0c9b90;
      --shadow-sm: 0 12px 30px rgba(22, 35, 66, 0.06);
      --shadow-lg: 0 28px 70px rgba(22, 35, 66, 0.12);
      --radius-sm: 18px;
      --radius-md: 28px;
      --container: 1140px;
      --heading-font: "Noto Serif SC", "Songti SC", Georgia, serif;
      --body-font: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      --transition: 220ms ease;
    }

    [data-theme="dark"] {
      --bg: #0f1729;
      --bg-soft: rgba(18, 28, 49, 0.78);
      --surface: #141f36;
      --text: #edf3ff;
      --muted: #9caacc;
      --muted-strong: #cdd9f7;
      --border: rgba(255, 255, 255, 0.1);
      --primary: #78a5ff;
      --primary-soft: rgba(120, 165, 255, 0.18);
      --secondary: #4dd7c8;
      --shadow-sm: 0 18px 40px rgba(2, 6, 23, 0.35);
      --shadow-lg: 0 32px 80px rgba(2, 6, 23, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: var(--body-font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(31, 94, 255, 0.12), transparent 32%),
        radial-gradient(circle at 85% 12%, rgba(12, 155, 144, 0.12), transparent 26%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), transparent 32%),
        var(--bg);
      transition: background-color var(--transition), color var(--transition);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
      opacity: 0.5;
      z-index: -2;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      color: inherit;
      background: none;
      border: 0;
      cursor: pointer;
    }

    .container {
      width: min(calc(100% - 32px), var(--container));
      margin: 0 auto;
    }

    .panel {
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow-sm);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: color-mix(in srgb, var(--bg-soft) 92%, transparent);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .nav-shell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 74px;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--heading-font);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 0 18px rgba(31, 94, 255, 0.55);
      flex-shrink: 0;
    }

    .nav-group,
    .site-nav,
    .nav-controls {
      display: flex;
      align-items: center;
    }

    .nav-group {
      gap: 18px;
    }

    .site-nav {
      gap: 8px;
      flex-wrap: wrap;
    }

    .site-nav a {
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.98rem;
      transition: background-color var(--transition), color var(--transition), transform var(--transition);
    }

    .site-nav a:hover,
    .site-nav a.active {
      color: var(--text);
      background: var(--primary-soft);
      transform: translateY(-1px);
    }

    .nav-controls {
      gap: 10px;
    }

    .control-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 42px;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition), border-color var(--transition);
    }

    .control-btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--primary) 35%, var(--border));
    }

    .theme-toggle {
      position: relative;
      width: 42px;
      padding: 0;
      overflow: hidden;
    }

    .theme-icon {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 20px;
      height: 20px;
      transition: transform 260ms ease, opacity 260ms ease;
      pointer-events: none;
    }

    [data-theme="light"] .theme-icon.moon {
      transform: translateY(18px) rotate(90deg);
      opacity: 0;
    }

    [data-theme="light"] .theme-icon.sun {
      transform: translateY(0) rotate(0deg);
      opacity: 1;
    }

    [data-theme="dark"] .theme-icon.sun {
      transform: translateY(-18px) rotate(-90deg);
      opacity: 0;
    }

    [data-theme="dark"] .theme-icon.moon {
      transform: translateY(0) rotate(0deg);
      opacity: 1;
    }

    .menu-toggle {
      display: none;
      width: 42px;
      height: 42px;
      padding: 0;
    }

    .menu-toggle span {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: var(--text);
      margin: 4px auto;
      transition: transform var(--transition), opacity var(--transition);
    }

    body.nav-open .menu-toggle span:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }

    body.nav-open .menu-toggle span:nth-child(2) {
      opacity: 0;
    }

    body.nav-open .menu-toggle span:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }

    .hero {
      position: relative;
      padding: 92px 0 72px;
      text-align: center;
      overflow: visible;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(18px);
      pointer-events: none;
    }

    .hero::before {
      width: 340px;
      height: 340px;
      background: rgba(31, 94, 255, 0.12);
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
    }

    .hero::after {
      width: 240px;
      height: 240px;
      background: rgba(12, 155, 144, 0.12);
      right: 14%;
      bottom: 60px;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      max-width: 980px;
    }

    .hero-title {
      max-width: 960px;
      font-family: var(--heading-font);
      font-size: clamp(2.8rem, 6vw, 5.2rem);
      line-height: 1.16;
      letter-spacing: -0.04em;
      padding-bottom: 0.14em;
      background: linear-gradient(135deg, var(--text) 0%, var(--primary) 70%, var(--secondary) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-subtitle {
      max-width: 760px;
      font-size: 1.12rem;
      line-height: 1.95;
      color: var(--muted-strong);
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      color: var(--muted-strong);
      font-size: 0.94rem;
      box-shadow: var(--shadow-sm);
    }

    .section {
      padding: 84px 0;
    }

    .section-heading {
      max-width: 680px;
      margin: 0 auto 38px;
      text-align: center;
    }

    .section-kicker {
      color: var(--primary);
      font-size: 0.92rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .section-title {
      font-family: var(--heading-font);
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.18;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
    }

    .section-desc {
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.85;
    }
    .contact-list {
      display: grid;
      gap: 14px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }

    .content-card {
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }

    .content-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: color-mix(in srgb, var(--primary) 20%, var(--border));
    }

    .card-visual {
      position: relative;
      aspect-ratio: 16 / 11;
      padding: 18px;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      color: #ffffff;
    }

    .card-visual::before,
    .card-visual::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      opacity: 0.6;
    }

    .tone-cobalt {
      background:
        radial-gradient(circle at 22% 24%, rgba(255, 255, 255, 0.3), transparent 28%),
        linear-gradient(135deg, #1b2f6a 0%, #2455ff 50%, #8ac6ff 100%);
    }

    .tone-cobalt::before {
      width: 180px;
      height: 180px;
      right: -28px;
      bottom: -42px;
      border: 1px solid rgba(255, 255, 255, 0.32);
    }

    .tone-sand {
      background:
        radial-gradient(circle at 76% 28%, rgba(255, 255, 255, 0.38), transparent 25%),
        linear-gradient(135deg, #7d5f44 0%, #b98f63 48%, #f0d2aa 100%);
    }

    .tone-sand::before {
      width: 110px;
      height: 110px;
      left: 24px;
      bottom: 20px;
      background: rgba(255, 255, 255, 0.14);
    }

    .tone-teal {
      background:
        radial-gradient(circle at 26% 22%, rgba(255, 255, 255, 0.28), transparent 25%),
        linear-gradient(135deg, #15435f 0%, #0ea5a3 48%, #8bf0dd 100%);
    }

    .tone-teal::before {
      width: 120px;
      height: 120px;
      right: 20px;
      top: 18px;
      border: 1px solid rgba(255, 255, 255, 0.28);
    }

    .visual-code {
      position: relative;
      z-index: 1;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.12);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .visual-mark {
      position: relative;
      z-index: 1;
      width: 72px;
      height: 72px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: grid;
      place-items: center;
      font-family: var(--heading-font);
      font-size: 1.4rem;
      font-weight: 700;
    }

    .card-body {
      padding: 28px;
    }

    .card-title {
      margin-bottom: 10px;
      font-size: 1.35rem;
      line-height: 1.35;
    }

    .card-desc {
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.82;
      margin-bottom: 18px;
      min-height: 5.4em;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-weight: 700;
      transition: gap var(--transition);
    }

    .content-card:hover .card-link {
      gap: 12px;
    }

    .contact-wrap {
      display: block;
    }

    .contact-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      max-width: 760px;
      margin: 0 auto;
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition), border-color var(--transition);
    }

    .contact-item:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--primary) 18%, var(--border));
    }

    .contact-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .contact-value {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--muted-strong);
      line-height: 1.45;
      word-break: break-word;
    }

    .contact-arrow {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary-soft);
      display: grid;
      place-items: center;
      color: var(--primary);
      font-size: 0.96rem;
    }

    .site-footer {
      padding: 24px 0 40px;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 980px) {
      .cards-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .contact-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .nav-shell {
        min-height: 68px;
      }

      .menu-toggle {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .nav-group {
        position: absolute;
        top: calc(100% + 12px);
        left: 16px;
        right: 16px;
        display: none;
        flex-direction: column;
        align-items: stretch;
        padding: 16px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: color-mix(in srgb, var(--surface) 96%, transparent);
        box-shadow: var(--shadow-lg);
      }

      body.nav-open .nav-group {
        display: flex;
      }

      .site-nav,
      .nav-controls {
        width: 100%;
      }

      .site-nav {
        flex-direction: column;
        align-items: stretch;
      }

      .site-nav a {
        width: 100%;
      }

      .nav-controls {
        justify-content: space-between;
      }

      .hero {
        padding: 84px 0 56px;
      }

      .hero-title {
        font-size: clamp(2.5rem, 12vw, 4rem);
        line-height: 1.18;
        padding-bottom: 0.1em;
      }

      .cards-grid,
      .contact-list {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .container {
        width: min(calc(100% - 20px), var(--container));
      }

      .contact-item {
        align-items: flex-start;
      }
    }
  </style>
</head>

  <main>

          subtitle: "I am currently a PhD student at PKU, with strong expertise in full-stack robotics development. Email: xinzhanhua@stu.pku.edu.cn"
        },
        projects: {
          kicker: "Highlights",
          title: "Research and Projects",
          desc: "",
          items: [
            {
              tone: "tone-cobalt",
              code: "Research",
              mark: "01",
              title: "ViDAR Multi-Sensor SLAM and RL-Based Active Perception",
              desc: "This work focuses on multi-sensor fusion, SLAM, and active perception in ViDAR scenarios, integrating reinforcement learning with robotic scene understanding and perception-driven decision making.",
              tags: ["SLAM", "Multi-sensor Fusion", "Active Perception"],
              href: "简历文件/CV_xzh-202603.pdf",
              cta: "Open CV"
            },
            {
              tone: "tone-sand",
              code: "Lab",
              mark: "02",
              title: "Motion Mechanisms and Control of Cross-Medium Bio-Inspired Robots",
              desc: "This line of work centers on motion mechanisms, control, and system coordination for bio-inspired robots operating across water and air, and it appears as a core research direction in the doctoral CV.",
              tags: ["Cross-medium Robotics", "Motion Control", "Bio-inspired Systems"],
              href: "简历文件/CV_xzh-202603.pdf",
              cta: "Open CV"
            },
            {
              tone: "tone-teal",
              code: "Project",
              mark: "03",
              title: "Confined-Space Transient Fire Suppression System / Intelligent Firefighting Robot",
              desc: "From undergraduate to doctoral work, this track continues to address robotic task execution in complex environments, including leading the Blue Shark suspended intelligent firefighting robot project and related transient fire suppression systems for confined spaces.",
              tags: ["System Integration", "Firefighting Robotics", "Technical Lead"],
              href: "简历文件/CV_xzh-202603.pdf",
              cta: "Open CV"
            }
          ]
        },
        contact: {
          kicker: "Contact",
          title: "Contact",
          desc: "",
          links: [
            { label: "Email", value: "xinzhanhua@stu.pku.edu.cn", href: "mailto:xinzhanhua@stu.pku.edu.cn" },
            { label: "Gitee", value: "gitee.com/xinzhanhua", href: "https://gitee.com/xinzhanhua" },
            { label: "GitHub", value: "github.com/xinzhanhua", href: "https://github.com/xinzhanhua" },
            { label: "Blog", value: "blog.xzh-fn-nas.top", href: "https://blog.xzh-fn-nas.top/" }
          ]
        },
        footer: "© 2026 XinZ. Built for GitHub Pages."
      }
    };

    const state = {
      lang: localStorage.getItem("lang") || "zh",
      theme: localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
    };

    const sections = ["projects", "contact"];

    function qs(selector, root = document) {
      return root.querySelector(selector);
    }

    function qsa(selector, root = document) {
      return Array.from(root.querySelectorAll(selector));
    }

    function renderPills(items, className = "pill") {
      return items.map((item) => '<span class="' + className + '">' + item + "</span>").join("");
    }

    function renderProjectCards(items) {
      return items.map((item) => {
        const target = item.href.startsWith("#") ? "" : ' target="_blank" rel="noreferrer noopener"';
        return (
          '<article class="panel content-card">' +
            '<div class="card-visual ' + item.tone + '">' +
              '<span class="visual-code">' + item.code + "</span>" +
              '<span class="visual-mark">' + item.mark + "</span>" +
            "</div>" +
            '<div class="card-body">' +
              '<h3 class="card-title">' + item.title + "</h3>" +
              '<p class="card-desc">' + item.desc + "</p>" +
              '<div class="pill-list" style="justify-content:flex-start; margin-bottom:18px;">' + renderPills(item.tags) + "</div>" +
              '<a class="card-link" href="' + item.href + '"' + target + ">" + item.cta + ' <span aria-hidden="true">→</span></a>' +
            "</div>" +
          "</article>"
        );
      }).join("");
    }

    function renderContactLinks(items) {
      return items.map((item) => {
        const target = item.href.startsWith("#") ? "" : ' target="_blank" rel="noreferrer noopener"';
        return (
          '<a class="contact-item" href="' + item.href + '"' + target + ">" +
            "<div>" +
              '<div class="contact-label">' + item.label + "</div>" +
              '<div class="contact-value">' + item.value + "</div>" +
            "</div>" +
            '<span class="contact-arrow" aria-hidden="true">↗</span>' +
          "</a>"
        );
      }).join("");
    }

    function renderPage() {
      const copy = siteContent[state.lang];

      document.documentElement.lang = state.lang === "zh" ? "zh-CN" : "en";
      document.title = copy.metaTitle;
      qs(".brand-name").textContent = copy.brand;
      qs(".lang-toggle").textContent = state.lang === "zh" ? "EN" : "中";

      qsa("[data-nav]").forEach((link) => {
        link.textContent = copy.nav[link.dataset.nav];
      });

      qs("#hero-title").textContent = copy.hero.title;
      qs("#hero-subtitle").textContent = copy.hero.subtitle;

      qs("#projects-kicker").textContent = copy.projects.kicker;
      qs("#projects-title").textContent = copy.projects.title;
      qs("#projects-desc").textContent = copy.projects.desc;
      qs("#projects-desc").style.display = copy.projects.desc ? "" : "none";
      qs("#projects-grid").innerHTML = renderProjectCards(copy.projects.items);

      qs("#contact-kicker").textContent = copy.contact.kicker;
      qs("#contact-title").textContent = copy.contact.title;
      qs("#contact-desc").textContent = copy.contact.desc;
      qs("#contact-desc").style.display = copy.contact.desc ? "" : "none";
      qs("#contact-list").innerHTML = renderContactLinks(copy.contact.links);

      qs("#site-footer").textContent = copy.footer;
    }

    function applyTheme() {
      document.documentElement.setAttribute("data-theme", state.theme);
      localStorage.setItem("theme", state.theme);
    }

    function initThemeToggle() {
      qs(".theme-toggle").addEventListener("click", () => {
        state.theme = state.theme === "light" ? "dark" : "light";
        applyTheme();
      });
    }

    function initLangToggle() {
      qs(".lang-toggle").addEventListener("click", () => {
        state.lang = state.lang === "zh" ? "en" : "zh";
        localStorage.setItem("lang", state.lang);
        renderPage();
        initActiveNav();
      });
    }

    function initMobileMenu() {
      const toggle = qs(".menu-toggle");
      toggle.addEventListener("click", () => {
        document.body.classList.toggle("nav-open");
      });

      qsa(".site-nav a").forEach((link) => {
        link.addEventListener("click", () => {
          document.body.classList.remove("nav-open");
        });
      });
    }

    let smoothScrollBound = false;

    function initSmoothScroll() {
      if (smoothScrollBound) {
        return;
      }

      document.addEventListener("click", (event) => {
        const anchor = event.target.closest('a[href^="#"]');
        if (!anchor) {
          return;
        }

        const href = anchor.getAttribute("href");
        if (!href || href === "#") {
          return;
        }

        const target = qs(href);
        if (!target) {
          return;
        }

        event.preventDefault();
        const offset = qs(".site-header").offsetHeight + 12;
        const top = target.getBoundingClientRect().top + window.scrollY - offset;

        window.scrollTo({
          top,
          behavior: "smooth"
        });
      });

      smoothScrollBound = true;
    }

    let sectionObserver;

    function initActiveNav() {
      if (sectionObserver) {
        sectionObserver.disconnect();
      }

      const navLinks = qsa(".site-nav a");
      const navById = new Map(navLinks.map((link) => [link.getAttribute("href").slice(1), link]));

      sectionObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) {
            return;
          }

          navLinks.forEach((link) => link.classList.remove("active"));
          const current = navById.get(entry.target.id);
          if (current) {
            current.classList.add("active");
          }
        });
      }, {
        rootMargin: "-40% 0px -45% 0px",
        threshold: 0.01
      });

      sections.forEach((id) => {
        const element = qs("#" + id);
        if (element) {
          sectionObserver.observe(element);
        }
      });
    }

    applyTheme();
    renderPage();

    document.addEventListener("DOMContentLoaded", () => {
      initThemeToggle();
      initLangToggle();
      initMobileMenu();
      initSmoothScroll();
      initActiveNav();
    });
  </script>
</body>
